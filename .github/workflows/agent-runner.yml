name: Run Headless CrewAI Automation

on:
  repository_dispatch:
    types: [trigger_notes_agent]

jobs:
  execute-crew:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code Repository
      uses: actions/checkout@v4

    - name: Set up Cloud Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Cache Dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}

    - name: Install Agent Requirements
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Execute CrewAI Pipeline
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: |
        # Pulls payload securely forwarded by n8n HTTP Request
        python main.py "${{ github.event.client_payload.user_query }}"
